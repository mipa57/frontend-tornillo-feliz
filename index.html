<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>El Tornillo Feliz - Sistema de Inventario</title>
        <link rel="stylesheet" href="css/styles.css">
    </head>
<body>

    <h1># El Tornillo Feliz</h1>

    <h2>Agregar Producto</h2>

    <form id="form-producto">
        <div>
            Código: 
            <input type="text" id="codigo" placeholder="Ej: TOR-001">
        </div>

        <div>
            Nombre: 
            <input type="text" id="nombre" placeholder="Ej: Martillo">
        </div>

        <div>
            Cantidad: 
            <input type="number" id="cantidad" value="0">
        </div>

        <div>
            Precio Venta ($): 
            <input type="number" id="precio" step="0.01" value="0">
        </div>

        <div>
            Stock Mínimo: 
            <input type="number" id="stock-minimo" value="5">
        </div>

        <button type="submit">Guardar Producto</button>
        <button type="button" id="btn-cancelar">Cancelar</button>
    </form>

    <hr>

    <h2>Inventario de Productos</h2>

    <table border="1">
        <thead>
            <tr>
                <th>CÓDIGO</th>
                <th>NOMBRE</th>
                <th>CANTIDAD</th>
                <th>PRECIO</th>
                <th>STOCK MÍNIMO</th>
                <th>ESTADO</th>
                <th>ACCIONES</th>
            </tr>
        </thead>
        <tbody id="tabla-productos">
            <tr>
                <td colspan="7">Cargando productos...</td>
            </tr>
        </tbody>
    </table>

    <script src="js/main.js"></script>
</body>
</html>
