x<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Tornillo Feliz - Sistema de Gestión</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            background: white;
            border-radius: 15px;
            padding: 20px 30px;
            margin-bottom: 25px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            color: #2c3e50;
            font-size: 28px;
        }

        .header h1 i {
            color: #e67e22;
            margin-right: 10px;
        }

        .badge {
            background: #27ae60;
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 14px;
        }

        /* Tarjetas de estadísticas */
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }

        .stat-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .stat-card i {
            font-size: 40px;
            margin-bottom: 10px;
        }

        .stat-card .number {
            font-size: 32px;
            font-weight: bold;
            color: #2c3e50;
        }

        .stat-card .label {
            color: #7f8c8d;
            font-size: 14px;
        }

        /* Panel de dos columnas */
        .dashboard {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 25px;
        }

        /* Formulario */
        .form-panel {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            height: fit-content;
        }

        .form-panel h2 {
            color: #2c3e50;
            margin-bottom: 20px;
            font-size: 20px;
            border-bottom: 2px solid #e67e22;
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }

        .form-group input:focus {
            outline: none;
            border-color: #e67e22;
        }

        button {
            background: #e67e22;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            width: 100%;
            transition: background 0.3s;
        }

        button:hover {
            background: #d35400;
        }

        /* Tabla de productos */
        .products-panel {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .products-panel h2 {
            color: #2c3e50;
            margin-bottom: 20px;
            font-size: 20px;
            border-bottom: 2px solid #e67e22;
            padding-bottom: 10px;
        }

        .table-container {
            overflow-x: auto;
            max-height: 500px;
            overflow-y: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: #2c3e50;
            color: white;
            padding: 12px;
            text-align: left;
            position: sticky;
            top: 0;
        }

        td {
            padding: 10px 12px;
            border-bottom: 1px solid #eee;
        }

        tr:hover {
            background: #f5f5f5;
        }

        .stock-bajo {
            background: #ffe6e6 !important;
            border-left: 4px solid #e74c3c;
        }

        .stock-normal {
            background: #e6ffe6 !important;
            border-left: 4px solid #27ae60;
        }

        .btn-eliminar {
            background: #e74c3c;
            padding: 5px 10px;
            font-size: 12px;
            width: auto;
        }

        .btn-eliminar:hover {
            background: #c0392b;
        }

        .alert {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            display: none;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #666;
        }

        @media (max-width: 768px) {
            .dashboard {
                grid-template-columns: 1fr;
            }
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1><i class="fas fa-tools"></i> El Tornillo Feliz</h1>
            <div class="badge">
                <i class="fas fa-check-circle"></i> Sistema en línea
            </div>
        </div>

        <!-- Estadísticas -->
        <div class="stats" id="stats">
            <div class="stat-card">
                <i class="fas fa-boxes" style="color: #3498db;"></i>
                <div class="number" id="totalProductos">0</div>
                <div class="label">Total Productos</div>
            </div>
            <div class="stat-card">
                <i class="fas fa-exclamation-triangle" style="color: #e74c3c;"></i>
                <div class="number" id="stockBajo">0</div>
                <div class="label">Stock Bajo</div>
            </div>
            <div class="stat-card">
                <i class="fas fa-dollar-sign" style="color: #27ae60;"></i>
                <div class="number" id="valorInventario">$0</div>
                <div class="label">Valor Inventario</div>
            </div>
        </div>

        <!-- Dashboard -->
        <div class="dashboard">
            <!-- Formulario -->
            <div class="form-panel">
                <h2><i class="fas fa-plus-circle"></i> Agregar Producto</h2>
                <div id="alert" class="alert"></div>
                <form id="productoForm">
                    <div class="form-group">
                        <label>Código</label>
                        <input type="text" id="codigo" required placeholder="Ej: TOR-001">
                    </div>
                    <div class="form-group">
                        <label>Nombre</label>
                        <input type="text" id="nombre" required placeholder="Ej: Martillo">
                    </div>
                    <div class="form-group">
                        <label>Cantidad</label>
                        <input type="number" id="cantidad" required placeholder="0">
                    </div>
                    <div class="form-group">
                        <label>Precio Venta ($)</label>
                        <input type="number" id="precioVenta" required placeholder="0" step="100">
                    </div>
                    <div class="form-group">
                        <label>Stock Mínimo</label>
                        <input type="number" id="stockMinimo" value="5" placeholder="5">
                    </div>
                    <button type="submit">
                        <i class="fas fa-save"></i> Guardar Producto
                    </button>
                </form>
            </div>

            <!-- Lista de productos -->
            <div class="products-panel">
                <h2><i class="fas fa-list"></i> Inventario de Productos</h2>
                <div class="table-container">
                    <table id="productosTable">
                        <thead>
                            <tr>
                                <th>Código</th>
                                <th>Nombre</th>
                                <th>Cantidad</th>
                                <th>Precio</th>
                                <th>Stock Mínimo</th>
                                <th>Estado</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="productosBody">
                            <tr><td colspan="7" class="loading">Cargando productos...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "http://localhost:8080/api/productos";

        // Mostrar alerta
        function showAlert(message, type) {
            const alert = document.getElementById('alert');
            alert.className = `alert alert-${type}`;
            alert.innerHTML = `<i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'}"></i> ${message}`;
            alert.style.display = 'block';
            setTimeout(() => {
                alert.style.display = 'none';
            }, 3000);
        }

        // Cargar y mostrar productos
        async function loadProducts() {
            try {
                const response = await fetch(API_URL);
                const products = await response.json();
                
                // Actualizar estadísticas
                updateStats(products);
                
                // Mostrar en tabla
                const tbody = document.getElementById('productosBody');
                if (products.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="7" class="loading">No hay productos registrados</td></tr>';
                    return;
                }
                
                tbody.innerHTML = products.map(p => {
                    const isBajoStock = p.cantidad <= p.stockMinimo;
                    return `
                        <tr class="${isBajoStock ? 'stock-bajo' : 'stock-normal'}">
                            <td><strong>${p.codigo}</strong></td>
                            <td>${p.nombre}</td>
                            <td>${p.cantidad}</td>
                            <td>$${p.precioVenta.toLocaleString()}</td>
                            <td>${p.stockMinimo}</td>
                            <td>
                                ${isBajoStock ? 
                                    '<span style="color:#e74c3c"><i class="fas fa-exclamation-triangle"></i> Stock bajo</span>' : 
                                    '<span style="color:#27ae60"><i class="fas fa-check-circle"></i> Normal</span>'}
                            </td>
                            <td>
                                <button class="btn-eliminar" onclick="deleteProduct('${p.id}')">
                                    <i class="fas fa-trash"></i> Eliminar
                                </button>
                            </td>
                        </tr>
                    `;
                }).join('');
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('productosBody').innerHTML = '<tr><td colspan="7" class="loading">Error al cargar productos</td></tr>';
            }
        }

        // Actualizar tarjetas de estadísticas
        function updateStats(products) {
            const total = products.length;
            const bajoStock = products.filter(p => p.cantidad <= p.stockMinimo).length;
            const valorTotal = products.reduce((sum, p) => sum + (p.cantidad * p.precioVenta), 0);
            
            document.getElementById('totalProductos').textContent = total;
            document.getElementById('stockBajo').textContent = bajoStock;
            document.getElementById('valorInventario').textContent = '$' + valorTotal.toLocaleString();
        }

        // Agregar producto
        async function addProduct(product) {
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(product)
                });
                
                if (response.ok) {
                    showAlert('Producto agregado exitosamente', 'success');
                    loadProducts();
                    return true;
                } else {
                    showAlert('Error al agregar producto', 'error');
                    return false;
                }
            } catch (error) {
                showAlert('Error de conexión', 'error');
                return false;
            }
        }

        // Eliminar producto
        async function deleteProduct(id) {
            if (confirm('¿Estás seguro de eliminar este producto?')) {
                try {
                    const response = await fetch(`${API_URL}/${id}`, {
                        method: 'DELETE'
                    });
                    
                    if (response.ok) {
                        showAlert('Producto eliminado', 'success');
                        loadProducts();
                    } else {
                        showAlert('Error al eliminar', 'error');
                    }
                } catch (error) {
                    showAlert('Error de conexión', 'error');
                }
            }
        }

        // Manejar envío del formulario
        document.getElementById('productoForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const product = {
                codigo: document.getElementById('codigo').value,
                nombre: document.getElementById('nombre').value,
                cantidad: parseInt(document.getElementById('cantidad').value),
                precioVenta: parseFloat(document.getElementById('precioVenta').value),
                stockMinimo: parseInt(document.getElementById('stockMinimo').value)
            };
            
            const success = await addProduct(product);
            if (success) {
                document.getElementById('productoForm').reset();
            }
        });

        // Cargar productos al iniciar
        loadProducts();
        
        // Recargar cada 30 segundos
        setInterval(loadProducts, 30000);
    </script>
</body>
</html>
