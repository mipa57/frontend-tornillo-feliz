<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Tornillo Feliz</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>El Tornillo Feliz</h1>
        </div>

        <!-- Tarjeta: Agregar Producto -->
        <div class="card">
            <div class="card-header">
                <h2>Agregar Producto</h2>
            </div>
            <div class="card-body">
                <form id="form-producto">
                    <div class="form-row">
                        <div class="form-group">
                            <label>CÓDIGO</label>
                            <input type="text" id="codigo" placeholder="Ej: TOR-001" required>
                        </div>
                        <div class="form-group">
                            <label>NOMBRE</label>
                            <input type="text" id="nombre" placeholder="Ej: Martillo" required>
                        </div>
                        <div class="form-group">
                            <label>CANTIDAD</label>
                            <input type="number" id="cantidad" value="0" required>
                        </div>
                        <div class="form-group">
                            <label>PRECIO VENTA ($)</label>
                            <input type="number" id="precio" step="0.01" value="0" required>
                        </div>
                        <div class="form-group">
                            <label>STOCK MÍNIMO</label>
                            <input type="number" id="stock-minimo" value="5" required>
                        </div>
                    </div>
                    <div class="btn-group">
                        <button type="submit" class="btn btn-primary">Guardar Producto</button>
                        <button type="button" id="btn-cancelar" class="btn btn-secondary">Cancelar</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Tarjeta: Inventario -->
        <div class="card">
            <div class="card-header">
                <h2>Inventario de Productos</h2>
            </div>
            <div class="card-body">
                <div id="mensaje-error" class="message message-error" style="display: none;"></div>
                <div id="mensaje-exito" class="message message-success" style="display: none;"></div>
                
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>CÓDIGO</th>
                                <th>NOMBRE</th>
                                <th>CANTIDAD</th>
                                <th>PRECIO</th>
                                <th>STOCK MÍNIMO</th>
                                <th>ESTADO</th>
                                <th>ACCIONES</th>
                            </tr>
                        </thead>
                        <tbody id="tabla-productos">
                            <tr>
                                <td colspan="7" class="loading">Cargando productos...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
